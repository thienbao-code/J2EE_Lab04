<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<body>
<div th:fragment="page(title, content)">
    <html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title th:text="${title}">Demo Product</title>
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
        <style>
            body {
                background: #ffffff;
                color: #1f2937;
            }

            .navbar {
                background: #198754 !important;
            }

            .navbar .navbar-brand,
            .navbar .nav-link {
                color: #ffffff !important;
            }

            .navbar .nav-link:hover {
                color: #d1fae5 !important;
            }

            .btn-primary,
            .btn-success {
                background-color: #198754;
                border-color: #198754;
            }

            .btn-primary:hover,
            .btn-success:hover {
                background-color: #157347;
                border-color: #157347;
            }

            .btn-secondary {
                background-color: #20c997;
                border-color: #20c997;
                color: #ffffff;
            }

            .btn-secondary:hover {
                background-color: #1aa179;
                border-color: #1aa179;
                color: #ffffff;
            }

            .card {
                background: #f0fdf4;
                border: 1px solid #bbf7d0;
                border-radius: 16px;
            }

            .table {
                background: #ffffff;
            }

            .table thead th {
                background: #198754;
                color: #ffffff;
            }

            .table-bordered > :not(caption) > * > * {
                border-color: #d1e7dd;
            }

            .alert-warning {
                background: #dcfce7;
                border-color: #86efac;
                color: #166534;
            }

            .form-control:focus,
            .form-select:focus {
                border-color: #198754;
                box-shadow: 0 0 0 0.25rem rgba(25, 135, 84, 0.25);
            }

            footer {
                background: #f8f9fa;
            }
        </style>
    </head>
    <body>
    <nav class="navbar navbar-expand-lg bg-body-tertiary border-bottom">
        <div class="container">
            <a class="navbar-brand fw-semibold" th:href="@{/products}">Product App</a>
            <div class="navbar-nav">
                <a class="nav-link" th:href="@{/products}">Products</a>
                <a class="nav-link" th:href="@{/categories}">Categories</a>
            </div>
        </div>
    </nav>
    <main class="container py-4" th:replace="${content}">
        Content
    </main>
    <footer class="border-top py-3 text-center text-body-secondary">
        <p class="mb-0">Copyright 2025 - Phat trien ung dung voi J2EE</p>
    </footer>
    </body>
    </html>
</div>
</body>
</html>
