<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<body th:replace="~{fragments/layout :: page('List products', ~{::section})}">
<section>
    <a th:href="@{/products/create}" class="btn btn-primary mb-3">Create New Product</a>
    <table class="table table-striped table-bordered align-middle">
        <thead>
        <tr>
            <th scope="col">#</th>
            <th scope="col">Name</th>
            <th scope="col">Price</th>
            <th scope="col">Image</th>
            <th scope="col">Category Name</th>
            <th scope="col"></th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="product : ${listproduct}">
            <th scope="row" th:text="${product.id}"></th>
            <td th:text="${product.name}"></td>
            <td th:text="${#numbers.formatInteger(product.price, 0, 'COMMA')}"></td>
            <td>
                <img th:if="${product.image != null && !#strings.isEmpty(product.image)}"
                     th:src="${product.image}"
                     alt="Product image"
                     style="height: 120px; width: 150px; object-fit: cover;">
            </td>
            <td th:text="${product.category != null ? product.category.name : ''}"></td>
            <td class="text-nowrap">
                <a th:href="@{/products/edit/{id}(id=${product.id})}" class="btn btn-secondary btn-sm">Edit</a>
                <form th:action="@{/products/delete/{id}(id=${product.id})}" method="post" class="d-inline">
                    <button type="submit" class="btn btn-danger btn-sm">Delete</button>
                </form>
            </td>
        </tr>
        </tbody>
    </table>
</section>
</body>
</html>
